default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: "🔎 yaml · Check YAML"
      - id: end-of-file-fixer
        name: "🔧 files · Ensure final newline"
      - id: trailing-whitespace
        name: "🧼 files · Trim trailing whitespace"
      - id: check-merge-conflict
        name: "🌳 git · Detect conflict markers"
      - id: forbid-new-submodules
        name: "🌳 git · Prevent submodule creation"
      - id: no-commit-to-branch
        name: "🌳 git · Protect main branches"
        args: [ "--branch", "main", "--branch", "master" ]
      - id: check-added-large-files
        name: "🌳 git · Block large file commits"
        args: ['--maxkb=5000']
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        name: "🌳 git · Validate commit message"
        stages: [commit-msg]
        additional_dependencies: [cz-conventional-gitmoji]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        name: "🧹 ruff · Check & fix"
        args: [--fix]
      - id: ruff-format
        name: "🧹 ruff · Format"
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: "🔒 gitleaks · Secret scan"
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        name: "📝 markdown · Format markdown"
        additional_dependencies:
          - mdformat-gfm # GitHub-Flavored Markdown support
          - mdformat-ruff # Python code formatting
          - mdformat-frontmatter # YAML frontmatter support
          - ruff # Required for mdformat-ruff
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        name: "📄 yaml · Format YAML files"
  - repo: https://github.com/mrtazz/checkmake.git
    rev: v0.3.2
    hooks:
      - id: checkmake
        name: "🐮 Makefile · Lint Makefile"
  - repo: local
    hooks:
      - id: unit-tests
        name: "🧪 pytest · Unit tests (local)"
        entry: make test-unit-local
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: all-tests
        name: "🧪 pytest · All tests (Docker)"
        entry: make test
        language: system
        pass_filenames: false
        stages: [pre-push]
