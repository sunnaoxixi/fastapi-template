name: Update Pre-commit Hooks

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Update pre-commit hooks
        run: pre-commit autoupdate

      - name: Run pre-commit on all files
        run: pre-commit run --all-files

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          commit-message: ':arrow_up: chore(deps): update pre-commit hooks'
          title: ':arrow_up: chore(deps): update pre-commit hooks'
          body: |
            This PR updates pre-commit hooks to their latest versions.

            Auto-generated by [update-precommit](.github/workflows/update-precommit.yml) workflow.
          branch: chore/update-precommit
          delete-branch: true
          labels: dependencies
