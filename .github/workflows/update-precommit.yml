name: Update Pre-commit Hooks

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Update pre-commit hooks
        run: pre-commit autoupdate

      - name: Run pre-commit on all files
        run: pre-commit run --all-files || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(pre-commit): update hooks'
          title: 'chore(pre-commit): update hooks'
          body: |
            This PR updates pre-commit hooks to their latest versions.

            Auto-generated by [update-precommit](.github/workflows/update-precommit.yml) workflow.
          branch: chore/update-precommit
          delete-branch: true
          labels: dependencies
